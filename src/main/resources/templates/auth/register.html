<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>회원가입 - Home Talk One Pass</title>
    <style>
        .auth-container { width: 400px; margin: 20px auto; text-align: center; border: 1px solid #bdbaba; padding: 30px; border-radius: 8px; }
        .input-group { margin-bottom: 15px; text-align: left; }
        .input-group label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        input { width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #bdbaba; border-radius: 4px; height: 50px; }
        button { width: 100%; padding: 12px; background-color: #376abc; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #4073c9; }

        .address-group label {margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        .address-group input{width: 65%; margin-right: 10px;}
        .address-group button{width: 30%;}
        .address-detail{ display: flex; justify-content: left; margin-bottom: 10px; font-weight: bold; font-size: 14px;  }
    </style>
</head>
<body>

<div class="auth-container">
    <h2>회원가입</h2>
    <p>서비스 이용을 위해 정보를 입력해주세요.</p>

    <!-- *{} = 객체를 전달받은 경우 매핑    -->
    <form method="post" th:action="@{/auth/register/signup}" th:object="${signUpDTO}">
        <input name="currentStep" th:value="${step}" type="hidden"/>

        <div th:if="${step == 1}">
            <div class="input-group">
                <label for="email">이메일</label>
                <input placeholder="example@hometalk.com" required th:field="*{email}" type="email">
            </div>

            <div class="input-group">
                <label for="loginId">아이디</label>
                <input placeholder="아이디를 입력하세요" required th:field="*{loginId}" type="text">
            </div>

            <div class="input-group">
                <label for="phoneNumber">연락처</label>
                <input placeholder="휴대폰 번호(-)제외" required th:field="*{phoneNumber}" type="text">
            </div>

            <div class="input-group">
                <label for="password">비밀번호</label>
                <input id="pw1" pattern="^(?=.*[A-Za-z])(?=.*\d)(?=.*[@$!%*#?&])[A-Za-z\d@$!%*#?&]{8,}$" placeholder="비밀번호를 입력하세요" required th:field="*{password}"
                       title="8자 이상, 영문, 숫자, 특수문자를 포함해야 합니다."
                       type="password">
            </div>

            <div class="input-group">
                <label>비밀번호 확인</label>
                <input type="password" id="pw2" placeholder="비밀번호 재입력">
                <p id="match-msg" style="font-size: 12px; margin-top: 5px;"></p>
            </div>

            <div class="input-group">
                <label for="name">이름</label>
                <input placeholder="이름을 입력하세요" required th:field="*{name}" type="text">
            </div>

            <div class="input-group">
                <label for="nickname">별명</label>
                <input placeholder="별명을 입력해주세요" required th:field="*{nickname}" type="text">
            </div>

            <button name="action" type="submit" value="next">다음</button>
        </div>

        <div th:if="${step == 2}">
            <input th:field="*{email}" type="hidden">
            <input th:field="*{loginId}" type="hidden">
            <input th:field="*{phoneNumber}" type="hidden">
            <input th:field="*{password}" type="hidden">
            <input th:field="*{name}" type="hidden">
            <input th:field="*{nickname}" type="hidden">

            <div class="input-group">
                <label for="postNum">주소</label>
                <div class="address-group">
                    <input id="postNum" placeholder="우편 번호를 입력하세요" th:field="*{postNum}" type="text">
                    <button onclick="execDaumPostcode()" type="button"> 우편번호 찾기</button>
                </div>
            </div>


            <div class="input-group">
                <label for="buildingName"></label>
                <input id="buildingName" placeholder="주소를 입력하세요" th:field="*{buildingName}" type="text">
            </div>

            <span class="address-detail">
                상세 주소
            </span>

            <div class="input-group">
                <label for="dong">동</label>
                <input placeholder="동을 입력하세요 (ex 102동 -> 102)" th:field="*{dong}" type="text">
            </div>

            <div class="input-group">
                <label for="ho">호</label>
                <input placeholder="호를 입력하세요 (ex 201호 -> 201)" th:field="*{ho}" type="text">
            </div>

            <div style="display: flex; gap: 10px;">
                <button name="action" type="submit" value="prev">이전</button>
                <button name="action" type="submit" value="complete">가입 완료</button>
            </div>
        </div>
    </form>
</div>


<script src="//t1.kakaocdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
<script>
    function execDaumPostcode() {
        new kakao.Postcode({
            oncomplete: function(data) {
                // 팝업에서 검색결과 항목을 클릭했을때 실행할 코드를 작성하는 부분.

                // 각 주소의 노출 규칙에 따라 주소를 조합한다.
                // 내려오는 변수가 값이 없는 경우엔 공백('')값을 가지므로, 이를 참고하여 분기 한다.
                var addr = ''; // 주소 변수
                var extraAddr = ''; // 참고항목 변수

                //사용자가 선택한 주소 타입에 따라 해당 주소 값을 가져온다.
                if (data.userSelectedType === 'R') { // 사용자가 도로명 주소를 선택했을 경우
                    addr = data.roadAddress;
                } else { // 사용자가 지번 주소를 선택했을 경우(J)
                    addr = data.jibunAddress;
                }

                // 사용자가 선택한 주소가 도로명 타입일때 참고항목을 조합한다.
                if(data.userSelectedType === 'R') {
                    // 법정동명이 있을 경우 추가한다. (법정리는 제외)
                    // 법정동의 경우 마지막 문자가 "동/로/가"로 끝난다.
                    if (data.bname !== '' && /[동로가]$/.test(data.bname)) {
                        extraAddr += data.bname;
                    }
                    // 건물명이 있고, 공동주택일 경우 추가한다.
                    if (data.buildingName !== '' && data.apartment === 'Y') {
                        extraAddr += (extraAddr !== '' ? ', ' + data.buildingName : data.buildingName);
                    }
                    // 표시할 참고항목이 있을 경우, 괄호까지 추가한 최종 문자열을 만든다.
                    if (extraAddr !== '') {
                        extraAddr = ' (' + extraAddr + ')';
                    }
                }

                // 우편번호와 주소 정보를 해당 필드에 넣는다.
                document.getElementById('postNum').value = data.zonecode;
                document.getElementById('buildingName').value = addr + extraAddr;

                // 주소 입력 후 바로 '동' 입력창으로 포커스 이동 (사용자 편의)
                document.getElementsByName('dong')[0].focus();
            }
        }).open();
    }




    // 2. 페이지 로드 시 비밀번호 체크 이벤트 연결
    window.onload = function() {
        const pw1 = document.getElementById('pw1');
        const pw2 = document.getElementById('pw2');
        const msg = document.getElementById('match-msg');

        // 요소가 존재할 때만(Step 1일 때만) 실행
        if (pw1 && pw2 && msg) {
            const checkMatch = function() {
                const val1 = pw1.value;
                const val2 = pw2.value;

                if (val1 === "" || val2 === "") {
                    msg.textContent = "";
                } else if (val1 === val2) {
                    msg.textContent = "✅ 비밀번호가 일치합니다.";
                    msg.style.color = "green";
                } else {
                    msg.textContent = "❌ 비밀번호가 일치하지 않습니다.";
                    msg.style.color = "red";
                }
            };

            pw1.addEventListener('input', checkMatch);
            pw2.addEventListener('input', checkMatch);
        }
    };
</script>
</body>
</html>
