<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>인증 페이지</title>
    <style>
        * {
            box-sizing: border-box;
            background: #FAF4F0
        }
        h2 {font-weight: 400; font-size: larger;}
        .auth-container { width: 400px; margin: 20px auto; min-height: 600px; padding: 30px; text-align: center; border: solid 1px #bdbaba; border-radius: 8px; margin-top: 75px;}
        .input-group { margin-bottom: 10px; width: 100% }
        input { width: 250px; padding: 10px; }
        button { width: 250px; padding: 10px; background-color: #3C6ABC; color: white; border: none; cursor: pointer; height: 40px; }
        button:hover { background-color: #4073c9; }


        .kakao-btn-container { margin-top: 15px; }
        .kakao-btn-container img {
            width: 100%;
            max-width: 250px;
            height: 40px;
            display: block;
            margin: 0 auto;
        }

        .naver-btn-container { margin-top: 15px; }
        .naver-btn-container img {
        width: 100%;
        max-width: 250px;
        height: 40px;
        display: block;
        margin: 0 auto;
        }
    </style>

</head>
<body>

<div class="auth-container">
    <h1>Home Talk One Pass</h1>
    <h3>로그인</h3>
    <form th:action="@{/auth/login}" method="post">
        <div class="input-group">
            <input type="text" name="loginId" placeholder="아이디를 입력하세요." required>
        </div>
        <div class="input-group">
            <input type="password" name="password" placeholder="비밀번호를 입력하세요." required>
        </div>
        <button type="submit">로그인</button>
    </form>

    <div class="other-contain">
        <p>계정이 없으신가요? <a th:href="@{/auth/register}">회원가입</a></p>

        <hr>
        <p>소셜로 로그인</p>
        <div class="kakao-btn-container">
            <a th:href="@{/oauth2/authorization/kakao}">
                <img th:src="@{/auth/loginimage/kakao_login.png}" alt="카카오 로그인">
            </a>
        </div>
        <div class="naver-btn-container">
            <a th:href="@{/oauth2/authorization/naver}">
                <img th:src="@{/auth/loginimage/naver_login.png}" alt="네이버 로그인">
            </a>
        </div>
    </div>


    <script th:if="${param.error}" th:inline="javascript">

        // 1. 알림창 띄우기
        alert("아이디 또는 비밀번호가 일치하지 않습니다.");

        // 2. 확인(OK)을 누르면 다시 깨끗한 로그인 페이지로 리다이렉트
        window.location.href = window.location.pathname;
        /*]]>*/
    </script>

</div>
</body>
</html>
