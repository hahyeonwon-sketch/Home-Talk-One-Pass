<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>인증 페이지</title>
    <style>
        * {
            box-sizing: border-box;
        }



        .logo-image {
            max-width: 200px;
            margin-bottom: 10px;
        }

        body {
            margin: 0;
            background: #9EBFDB;
        }

        .auth-container {
            background: #fefefe;
            width: 400px;
            margin: 75px auto 20px;
            min-height: 600px;
            padding: 30px;
            text-align: center;
            border: 1px solid #bdbaba;
            border-radius: 8px;
            background: #ffffff;
        }

        p {margin: 8px auto; font-size: 14px;}

        .input-group {
            margin-bottom: 10px;
            width: 100%;
        }

        input {
            width: 250px;
            padding: 10px;
            border-radius: 8px;
        }

        button {
            width: 250px;
            padding: 10px;
            background-color: #3C6ABC;
            color: white;
            border: none;
            cursor: pointer;
            height: 40px;
            border-radius: 8px;
            margin-top: 5px;
        }

        button:hover {
            background-color: #4073c9;
        }

        hr {
            width: 100%;
            margin: 14px auto;
            border: 0;
            border-top: 1px solid #a7b3c5;
        }

        .other-contain {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .social-login-list {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 16px;
            margin-top: 8px;
        }

        .kakao-btn-container,
        .naver-btn-container {
            margin-top: 0;
        }

        .kakao-btn-container img,
        .naver-btn-container img {
            width: 48px;
            height: 48px;
            display: block;
            margin: 0;
        }
    </style>
</head>
<body>

<div class="auth-container">
    <img th:src="@{/auth/loginimage/logo.png}" alt="로그인 로고 이미지" class="logo-image">

    <form th:action="@{/auth/login}" method="post">
        <div class="input-group">
            <input type="text" name="loginId" placeholder="아이디를 입력하세요." required>
        </div>
        <div class="input-group">
            <input type="password" name="password" placeholder="비밀번호를 입력하세요." required>
        </div>
        <button type="submit">로그인</button>
    </form>

    <div class="other-contain">
        <p>계정이 없으신가요? <a th:href="@{/auth/register}">회원가입</a></p>

        <hr>

        <p>소셜 로그인</p>
        <div class="social-login-list">
            <div class="kakao-btn-container">
                <a th:href="@{/oauth2/authorization/kakao}">
                    <img th:src="@{/auth/loginimage/kakao_login.png}" alt="카카오 로그인">
                </a>
            </div>
            <div class="naver-btn-container">
                <a th:href="@{/oauth2/authorization/naver}">
                    <img th:src="@{/auth/loginimage/naver_login.png}" alt="네이버 로그인">
                </a>
            </div>
        </div>
    </div>

    <script th:if="${param.error}" th:inline="javascript">
        alert("아이디 또는 비밀번호가 일치하지 않습니다.");
        window.location.href = window.location.pathname;
    </script>
</div>

</body>
</html>
