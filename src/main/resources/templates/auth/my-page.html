<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마이페이지 | Home talk</title>
    <link rel="stylesheet" th:href="@{/css/auth/my-page.css}">
</head>
<body class="my-page-popup">
<div class="my-page-popup__shell">
    <div class="my-page-popup__panel">
        <header class="my-page-popup__header">
            <div>
                <p class="my-page-popup__login-info" th:text="${myPage.authType}">일반 로그인</p>
                <h1 class="my-page-popup__title">내 회원 정보</h1>
            </div>
            <button type="button" class="my-page-popup__close" onclick="closeMyPagePopup()" aria-label="닫기">X</button>
        </header>

        <main class="my-page-popup__content">
            <section class="my-page-popup__section">
                <h2 class="my-page-popup__section-title">기본 정보</h2>
                <div class="my-page-popup__info-list">
                    <div class="my-page-popup__info-item">
                        <span class="my-page-popup__label">이름</span>
                        <p class="my-page-popup__value" th:text="${myPage.name ?: '-'}">-</p>
                    </div>
                    <div class="my-page-popup__info-item">
                        <span class="my-page-popup__label">닉네임</span>
                        <p class="my-page-popup__value" th:text="${myPage.nickname ?: '-'}">-</p>
                    </div>
                    <div class="my-page-popup__info-item">
                        <span class="my-page-popup__label">이메일</span>
                        <p class="my-page-popup__value" th:text="${myPage.email ?: '-'}">-</p>
                    </div>
                    <div class="my-page-popup__info-item">
                        <span class="my-page-popup__label">전화번호</span>
                        <p class="my-page-popup__value" th:text="${myPage.phoneNumber ?: '-'}">-</p>
                    </div>
                    <div class="my-page-popup__info-item">
                        <span class="my-page-popup__label">소셜 플랫폼</span>
                        <p class="my-page-popup__value" th:text="${myPage.socialPlatform ?: '-'}">-</p>
                    </div>
                </div>
            </section>

            <section class="my-page-popup__section">
                <h2 class="my-page-popup__section-title">세대 정보</h2>
                <div class="my-page-popup__info-list">
                    <div class="my-page-popup__info-item">
                        <span class="my-page-popup__label">주소</span>
                        <p class="my-page-popup__value" th:text="${myPage.buildingName ?: '-'}">-</p>
                    </div>
                    <div class="my-page-popup__info-item">
                        <span class="my-page-popup__label">동</span>
                        <p class="my-page-popup__value" th:text="${myPage.dong ?: '-'}">-</p>
                    </div>
                    <div class="my-page-popup__info-item">
                        <span class="my-page-popup__label">호</span>
                        <p class="my-page-popup__value" th:text="${myPage.ho ?: '-'}">-</p>
                    </div>
                    <div class="my-page-popup__info-item">
                        <span class="my-page-popup__label">우편번호</span>
                        <p class="my-page-popup__value" th:text="${myPage.postNum ?: '-'}">-</p>
                    </div>
                </div>
            </section>
        </main>

        <div class="my-page-popup__actions">
            <form th:action="@{/auth/logout}" method="post" class="my-page-popup__logout-form" onsubmit="return submitLogoutFromPopup(this)">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="my-page-popup__logout-btn">로그아웃</button>
            </form>
            <form th:action="@{/auth/withdraw}" method="post" class="my-page-popup__withdraw-form" onsubmit="return submitWithdrawalFromPopup(this)">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="my-page-popup__withdraw-btn">회원 탈퇴</button>
            </form>
        </div>
    </div>
</div>

<script>
    function closeMyPagePopup() {
        window.close();

        if (!window.closed) {
            window.history.back();
        }
    }

    function submitLogoutFromPopup(form) {
        if (window.opener && !window.opener.closed) {
            submitActionToOpener(form);
            window.close();
            return false;
        }

        return true;
    }

    function submitWithdrawalFromPopup(form) {
        if (!confirm('정말 회원 탈퇴하시겠습니까? 탈퇴 후에는 계정을 복구할 수 없습니다.')) {
            return false;
        }

        if (window.opener && !window.opener.closed) {
            submitActionToOpener(form);
            window.close();
            return false;
        }

        return true;
    }

    function submitActionToOpener(form) {
        const openerDocument = window.opener.document;
        const submitForm = openerDocument.createElement('form');
        const csrfField = form.querySelector('input[type="hidden"]');

        submitForm.method = 'post';
        submitForm.action = form.action;
        submitForm.style.display = 'none';

        if (csrfField) {
            const hidden = openerDocument.createElement('input');
            hidden.type = 'hidden';
            hidden.name = csrfField.name;
            hidden.value = csrfField.value;
            submitForm.appendChild(hidden);
        }

        openerDocument.body.appendChild(submitForm);
        submitForm.submit();
    }
</script>
</body>
</html>
