<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>추가 정보 입력 - Home Talk</title>
    <style>
        .container { max-width: 400px; margin: 50px auto; font-family: sans-serif; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[readonly] { background-color: #eee; cursor: not-allowed; }
        input { width: 100%; padding: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #fee500; border: none; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
<div class="container">
    <h2>🎉 가입을 환영합니다!</h2>
    <p>서비스 이용을 위해 추가 정보를 입력해주세요.</p>
    <hr>
    <form th:action="@{/signup/extra}" method="post">
        <div class="form-group">
            <label>이메일</label>
            <input type="email" name="email" th:value="${email}" readonly>
        </div>

        <div class="form-group">
            <label>닉네임</label>
            <input type="text" name="nickname" placeholder="사용하실 닉네임을 입력하세요" required>
        </div>

        <div class="form-group">
            <label>전화번호</label>
            <input type="tel" name="phone" placeholder="010-0000-0000" required>
        </div>

        <button type="submit">가입 완료</button>
    </form>
</div>
</body>
</html>
