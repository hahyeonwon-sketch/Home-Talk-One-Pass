<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>추가 정보 입력 - Home Talk</title>
    <style>
        .auth-container { width: 400px; margin: 20px auto; text-align: center; border: 1px solid #bdbaba; padding: 20px; border-radius: 8px; }
        .input-group { margin-bottom: 15px; text-align: left; }
        .input-group label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        input { width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #bdbaba; border-radius: 4px; height: 50px; }
        button { width: 100%; padding: 12px; background-color: #376abc; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #4073C9; }

        .address-group label {margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        .address-group input{width: 65%; margin-right: 10px;}
        .address-group button{width: 30%;}
        .address-detail{ display: flex; justify-content: left; margin-bottom: 10px; font-weight: bold; font-size: 14px;  }

    </style>
</head>
<body>
<div class="auth-container">
    <h2>🎉 가입을 환영합니다!</h2>
    <p>서비스 이용을 위해 추가 정보를 입력해주세요.</p>
    <hr>
    <form th:action="@{/auth/register/social}" th:object="${socialSignUpDTO}" method="post">

        <!-- 소셜 로그인 단계에서 이미 확보한 값이라 사용자 수정 없이 hidden 으로 유지한다. -->
        <input type="hidden" th:field="*{email}">
        <input type="hidden" th:field="*{platform}">
        <input type="hidden" th:field="*{platformId}">


        <div class="input-group">
            <label for="name">이름</label>
            <input type="text" th:field="*{name}" placeholder="실명을 입력하세요" required>
        </div>

        <div class="input-group">
            <label for="nickname">별명</label>
            <input type="text" th:field="*{nickname}" placeholder="별명을 입력해주세요" required>
        </div>

        <div class="input-group">
            <label>전화번호</label>
            <input type="tel" th:field="*{phoneNumber}" placeholder="휴대폰 번호(-)제외" required>
        </div>

        <div class="input-group">
            <label for="postNum">주소</label>
            <div class="address-group">
                <input type="text" th:field="*{postNum}" id="postNum" placeholder="우편 번호" readonly>
                <button type="button" onclick="execDaumPostcode()">찾기</button>
            </div>
        </div>

        <div class="input-group">
            <input type="text" th:field="*{buildingName}" id="buildingName" placeholder="주소를 입력하세요" readonly>
        </div>

        <div class="input-group">
            <label for="dong">동</label>
            <input type="text" th:field="*{dong}" placeholder="동을 입력하세요 (ex 102동 -> 102 입력)">
        </div>

        <div class="input-group">
            <label for="ho">호</label>
            <input type="text" th:field="*{ho}" placeholder="호를 입력하세요 (ex 201호 -> 201 입력)">
        </div>

        <button type="submit">가입 완료</button>
    </form>
</div>

<script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
<script>
    function execDaumPostcode() {
        // 기본 주소는 우편번호 API로 채우고, 동/호만 사용자가 보완하도록 분리한다.
        new daum.Postcode({
            oncomplete: function(data) {
                document.getElementById('postNum').value = data.zonecode;
                document.getElementById('buildingName').value = data.address;
            }
        }).open();
    }
</script>
</body>
</html>
