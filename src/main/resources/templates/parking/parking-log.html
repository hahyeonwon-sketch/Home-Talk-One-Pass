<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>주차 기록 조회</title>
  <style>
    /* CSS는 나중에 추가 */
  </style>
</head>
<body>

<div class="container">
  <h2 class="page-title">주차 기록 조회</h2>

  <!-- 년/월 선택 -->
  <div class="date-filter">

    <!-- 년 선택 -->
    <div class="dropdown-wrapper">
      <button type="button" id="yearBtn" onclick="toggleYearDropdown()">
        <span id="selectedYear"></span> ▼
      </button>
      <div id="yearDropdown" class="dropdown" style="display:none;">
        <ul id="yearList"></ul>
      </div>
    </div>

    <!-- 월 선택 -->
    <div class="dropdown-wrapper">
      <button type="button" id="monthBtn" onclick="toggleMonthDropdown()">
        <span id="selectedMonth"></span> ▼
      </button>
      <div id="monthDropdown" class="dropdown" style="display:none;">
        <ul id="monthList"></ul>
      </div>
    </div>

  </div>

  <!-- 주차 기록 테이블 -->
  <table id="parkingTable">
    <thead>
    <tr>
      <th>차량 번호</th>
      <th>입차시간</th>
      <th>출차시간</th>
      <th>등록구분</th>
      <th>정산내역</th>
    </tr>
    </thead>
    <tbody id="parkingList">
    <tr>
      <td colspan="5">주차 기록이 없습니다.</td>
    </tr>
    </tbody>
  </table>
</div>

<script th:inline="javascript">
  const contextPath = /*[[@{/}]]*/ '/';
  const YEARS  = [2026,2025,2024,2023,2022,2021,2020,2019,2018];
  const MONTHS = ["1월","2월","3월","4월","5월","6월","7월","8월","9월","10월","11월","12월"];
  const TODAY  = new Date();

  let selectedYear = TODAY.getFullYear();
  let selectedMonth = TODAY.getMonth() + 1;

  document.getElementById('selectedYear').textContent = `${selectedYear}년`;
  document.getElementById('selectedMonth').textContent = `${selectedMonth}월`;

  const yearList = document.getElementById('yearList');
  YEARS.forEach(y => {
      const li = document.createElement('li');
      li.textContent = `${y}년`;
      li.addEventListener('click', () => {
          selectedYear = y;
          document.getElementById('selectedYear').textContent = `${y}년`;
          toggleYearDropdown();
          loadParkingLogs();
      });
      yearList.appendChild(li);
  });

  const monthList = document.getElementById('monthList');
  MONTHS.forEach((m, index) => {
      const li = document.createElement('li');
      li.textContent = m;
      li.addEventListener('click', () => {
          selectedMonth = index + 1;
          document.getElementById('selectedMonth').textContent = m;
          toggleMonthDropdown();
          loadParkingLogs();
      });
      monthList.appendChild(li);
  });

  function closeAllDropdowns() {
      document.getElementById('yearDropdown').style.display = 'none';
      document.getElementById('monthDropdown').style.display = 'none';
  }

  function toggleYearDropdown() {
      const dropdown = document.getElementById('yearDropdown');
      const isOpen = dropdown.style.display !== 'none';
      closeAllDropdowns();
      if (!isOpen) dropdown.style.display = 'block';
  }

  function toggleMonthDropdown() {
      const dropdown = document.getElementById('monthDropdown');
      const isOpen = dropdown.style.display !== 'none';
      closeAllDropdowns();
      if (!isOpen) dropdown.style.display = 'block';
  }

  document.addEventListener('click', (e) => {
      if (!e.target.closest('.dropdown-wrapper')) {
          closeAllDropdowns();
      }
  });

  document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeAllDropdowns();
  });

  function loadParkingLogs() {
      const parkingList = document.getElementById('parkingList');
      parkingList.innerHTML = '<tr><td colspan="5">로딩 중...</td></tr>';

      fetch(`${contextPath}parking/logs/data?year=${selectedYear}&month=${selectedMonth}`)
          .then(async res => {
              if (!res.ok) {
                  const msg = await res.text();
                  throw new Error(msg || '서버 오류');
              }
              return res.json();
          })
          .then(data => {
              parkingList.innerHTML = '';

              if (data.length === 0) {
                  parkingList.innerHTML = '<tr><td colspan="5">주차 기록이 없습니다.</td></tr>';
                  return;
              }

              data.forEach(log => {
                  const row = document.createElement('tr');
                  row.innerHTML = `
                      <td>${log.vehicleNumber}</td>
                      <td>${log.entryTime}</td>
                      <td>${log.exitTime ?? '주차 중'}</td>
                      <td>${log.entryType}</td>
                      <td>${log.settlement}</td>
                  `;
                  parkingList.appendChild(row);
              });
          })
          .catch(err => {
              console.error(err);
              parkingList.innerHTML = '<tr><td colspan="5">데이터 조회 중 오류가 발생했습니다.</td></tr>';
          });
  }

  loadParkingLogs();
</script>

</body>
</html>
