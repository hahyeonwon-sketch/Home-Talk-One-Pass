<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>월별 주차 기록</title>
  <link rel="stylesheet" th:href="@{/css/dashboard/style.css}">
  <link rel="stylesheet" th:href="@{/css/parking/parking-common.css}">
</head>
<body>

<div class="container">
  <h2 class="page-title">월별 주차 기록</h2>

  <!-- 년/월 필터 -->
  <div class="pk-filter-group">
    <div class="pk-dropdown-wrapper">
      <button type="button" class="pk-dropdown-btn" onclick="toggleYearDropdown()">
        <span id="selectedYear"></span> ▼
      </button>
      <div id="yearDropdown" class="pk-dropdown-menu" style="display:none;">
        <ul id="yearList"></ul>
      </div>
    </div>

    <div class="pk-dropdown-wrapper">
      <button type="button" class="pk-dropdown-btn" onclick="toggleMonthDropdown()">
        <span id="selectedMonth"></span> ▼
      </button>
      <div id="monthDropdown" class="pk-dropdown-menu" style="display:none;">
        <ul id="monthList"></ul>
      </div>
    </div>
  </div>

  <!-- 주차 기록 테이블 -->
  <table class="park-table">
    <thead>
    <tr>
      <th>차량 번호</th>
      <th>구분</th>
      <th>입차 시간</th>
      <th>출차 시간</th>
      <th>정산 내역</th>
    </tr>
    </thead>
    <tbody id="parkingList">
    <tr>
      <td colspan="5" class="pk-empty">주차 기록이 없습니다.</td>
    </tr>
    </tbody>
  </table>
</div>

<script th:inline="javascript">
  const contextPath = /*[[@{/}]]*/ '/';
  const YEARS  = [2026, 2025, 2024, 2023, 2022, 2021, 2020];
  const MONTHS = ["1월","2월","3월","4월","5월","6월","7월","8월","9월","10월","11월","12월"];
  const TODAY  = new Date();

  let selectedYear  = TODAY.getFullYear();
  let selectedMonth = TODAY.getMonth() + 1;

  document.getElementById('selectedYear').textContent  = `${selectedYear}년`;
  document.getElementById('selectedMonth').textContent = `${selectedMonth}월`;

  // 년 목록 생성
  const yearList = document.getElementById('yearList');
  YEARS.forEach(y => {
      const li = document.createElement('li');
      li.textContent = `${y}년`;
      li.addEventListener('click', () => {
          selectedYear = y;
          document.getElementById('selectedYear').textContent = `${y}년`;
          toggleYearDropdown();
          loadParkingLogs();
      });
      yearList.appendChild(li);
  });

  // 월 목록 생성
  const monthList = document.getElementById('monthList');
  MONTHS.forEach((m, index) => {
      const li = document.createElement('li');
      li.textContent = m;
      li.addEventListener('click', () => {
          selectedMonth = index + 1;
          document.getElementById('selectedMonth').textContent = m;
          toggleMonthDropdown();
          loadParkingLogs();
      });
      monthList.appendChild(li);
  });

  function closeAllDropdowns() {
      document.getElementById('yearDropdown').style.display  = 'none';
      document.getElementById('monthDropdown').style.display = 'none';
  }

  function toggleYearDropdown() {
      const dd = document.getElementById('yearDropdown');
      const isOpen = dd.style.display !== 'none';
      closeAllDropdowns();
      if (!isOpen) dd.style.display = 'block';
  }

  function toggleMonthDropdown() {
      const dd = document.getElementById('monthDropdown');
      const isOpen = dd.style.display !== 'none';
      closeAllDropdowns();
      if (!isOpen) dd.style.display = 'block';
  }

  document.addEventListener('click', (e) => {
      if (!e.target.closest('.pk-dropdown-wrapper')) closeAllDropdowns();
  });

  function loadParkingLogs() {
      fetch(`${contextPath}parking/logs/data?year=${selectedYear}&month=${selectedMonth}`)
          .then(res => {
              if (!res.ok) throw new Error('서버 오류');
              return res.json();
          })
          .then(data => {
              const tbody = document.getElementById('parkingList');
              tbody.innerHTML = '';

              if (data.length === 0) {
                  tbody.innerHTML = '<tr><td colspan="5" class="pk-empty">주차 기록이 없습니다.</td></tr>';
                  return;
              }

              data.forEach(log => {
                  const tr = document.createElement('tr');
                  tr.innerHTML = `
                      <td>${log.vehicleNumber}</td>
                      <td>${log.entryType}</td>
                      <td>${log.entryTime}</td>
                      <td>${log.exitTime}</td>
                      <td>${log.settlement}</td>
                  `;
                  tbody.appendChild(tr);
              });
          })
          .catch(err => {
              console.error(err);
              alert('데이터 조회 중 오류가 발생했습니다.');
          });
  }

  loadParkingLogs();
</script>

</body>
</html>
