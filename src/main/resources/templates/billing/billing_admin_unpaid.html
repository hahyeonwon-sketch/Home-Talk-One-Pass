<!DOCTYPE html>
<!--
    미납 세대 관리 페이지 (billing/admin/unpaid)
    - 납부 status (paid/unpaid) 확인, 미납세대 납부완료 처리
    - 연/월/동/미납/3개월이상 체납 조회
    - 전체세대/납부완료/미납세대/납부율 통계
-->

<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>미납 세대 관리</title>
    <meta name="_csrf"        th:content="${_csrf?.token}" />
    <meta name="_csrf_header" th:content="${_csrf?.headerName}" />
    <link rel="stylesheet" th:href="@{/css/dashboard/style.css}" />
    <link rel="stylesheet" th:href="@{/css/billing/billing_common.css}" />
    <link rel="stylesheet" th:href="@{/css/billing/billing_admin_unpaid.css}" />
</head>
<body>

<div class="main-layout" style="display:flex; min-height:100vh;">

    <div th:replace="~{fragments/sidebar :: sidebar(currentPage='billing')}"></div>

    <div class="main-wrapper" style="flex:1; display:flex; flex-direction:column;">

        <div th:replace="~{fragments/headerCurrentMenuView :: path(paths=${ {'billing'} })}"></div>

        <header class="category-menu-bar">&nbsp;</header>

        <div class="main-content">

            <div class="page-title">미납 세대 관리</div>

            <!-- 통계 카드 윗줄: 필터 기준 -->
            <div class="stat-section-label" id="statFilterLabel">현재 필터 기준</div>
            <div class="stat-grid">
                <div class="stat-card">
                    <div class="stat-label">전체 세대</div>
                    <div class="stat-value" id="statTotal">—</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">납부 완료</div>
                    <div class="stat-value accent" id="statPaid">—</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">미납 세대</div>
                    <div class="stat-value warn" id="statUnpaid">—</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">납부율</div>
                    <div class="stat-value" id="statRate">—</div>
                </div>
            </div>

            <!-- 통계 카드 아랫줄: 전체 기간 고정, 토글 -->
            <!-- 전체 누적 기준 (토글) -->
            <div class="stat-section-label stat-toggle-label" onclick="toggleGlobalStats()">
                <strong>전체 누적 기준</strong>
                <span class="stat-toggle-icon" id="globalStatsIcon">▼</span>
            </div>
            <div class="stat-grid-global-wrap" id="globalStatsWrap" style="display:none">
                <div class="stat-grid stat-grid-global">
                    <div class="stat-card stat-card-sm">
                        <div class="stat-label-sm">전체기간 총 미납건수</div>
                        <div class="stat-value-sm warn" id="statGlobalBillings">—</div>
                    </div>
                    <div class="stat-card stat-card-sm">
                        <div class="stat-label-sm">미납 세대</div>
                        <div class="stat-value-sm warn" id="statGlobalHouseholds">—</div>
                    </div>
                    <div class="stat-card stat-card-sm">
                        <div class="stat-label-sm">3개월 이상 체납<br></div>
                        <div class="stat-value-sm" id="statGlobalOverdue" style="color:#d83c2d;">—</div>
                    </div>
                </div>
            </div>


            <!-- 필터 -->
            <div class="filter-row">
                <div class="panel-wrap">
                    <button class="filter-btn" id="btnYear" onclick="togglePanel('year')">
                        <span id="lblYear">2026년</span><span class="caret">▼</span>
                    </button>
                    <div class="filter-panel" id="panelYear" style="display:none">
                        <div class="chip-grid year-g" id="yearGrid"></div>
                    </div>
                </div>
                <div class="panel-wrap">
                    <button class="filter-btn" id="btnMonth" onclick="togglePanel('month')">
                        <span id="lblMonth">전체 월</span><span class="caret">▼</span>
                    </button>
                    <div class="filter-panel" id="panelMonth" style="display:none">
                        <div class="chip-grid month-g" id="monthGrid"></div>
                    </div>
                </div>
                <div class="panel-wrap">
                    <button class="filter-btn" id="btnDong" onclick="togglePanel('dong')">
                        <span id="lblDong">전체 동</span><span class="caret">▼</span>
                    </button>
                    <div class="filter-panel" id="panelDong" style="display:none">
                        <div class="chip-grid dong-g" id="dongGrid"></div>
                    </div>
                </div>
                <div class="panel-wrap">
                    <button class="filter-btn" id="btnUnpaidFilter" onclick="togglePanel('unpaid')">
                        <span id="lblUnpaid">미납만 보기</span><span class="caret">▼</span>
                    </button>
                    <div class="filter-panel" id="panelUnpaid" style="display:none">
                        <div class="chip-grid status-g"></div>
                    </div>
                </div>
            </div>

            <!-- ★ 일괄처리 액션 바 (체크 시 표시) -->
            <div class="bulk-action-bar" id="bulkActionBar" style="display:none">
                <span id="bulkCount">0건 선택됨</span>
                <div class="bulk-actions">
                    <button class="btn btn-ghost" onclick="clearAllChecks()">선택 해제</button>
                    <button class="btn btn-point" onclick="openBulkConfirm()">납부완료 처리</button>
                </div>
            </div>

            <!-- 테이블 -->
            <div class="table-section">
                <div class="table-wrap">
                    <table class="data-table">
                        <thead>
                        <tr>
                            <th style="width:40px;">
                                <input type="checkbox" id="checkAll" onclick="toggleAllChecks(this)">
                            </th>
                            <th>NUM</th>
                            <th class="sortable" onclick="sortBy('unit')">동/호 <span class="sort-icon">▼</span></th>
                            <th>입주민</th>
                            <th class="sortable" onclick="sortBy('billingMonth')">부과월 <span class="sort-icon">▼</span></th>
                            <th class="sortable" onclick="sortBy('totalAmount')">청구금액 <span class="sort-icon">▼</span></th>
                            <th class="sortable" onclick="sortBy('dueDate')">납기일 <span class="sort-icon">▼</span></th>
                            <th class="sortable" onclick="sortBy('status')">status <span class="sort-icon">▼</span></th>
                            <th>처리</th>
                        </tr>
                        </thead>
                        <tbody id="billingTableBody">
                        <tr>
                            <td colspan="9" class="empty-state">불러오는 중...</td>
                        </tr>
                        </tbody>
                    </table>
                </div>

                <!-- 페이지네이션 -->
                <div class="pagination" id="paginationWrap"></div>
            </div>

        </div>

        <footer th:replace="~{fragments/footer :: footer}"></footer>

    </div>
</div>

<!-- 단건 납부완료 팝업 -->
<div class="confirm-overlay" id="confirmOverlay" style="display:none">
    <div class="confirm-box">
        <div class="confirm-title">납부완료 처리</div>
        <div class="confirm-unit" id="confirmUnit"></div>
        <div class="confirm-month" id="confirmMonth"></div>
        <div class="confirm-msg-warn">납부완료 처리를 하시겠습니까? (변경불가)</div>
        <div class="confirm-btns">
            <button class="btn btn-ghost" onclick="closeConfirm()">취소</button>
            <button class="btn btn-point" onclick="processPayment()">확인</button>
        </div>
    </div>
</div>

<!-- 일괄 납부완료 팝업 -->
<div class="confirm-overlay" id="bulkConfirmOverlay" style="display:none">
    <div class="confirm-box">
        <div class="confirm-title">일괄 납부완료 처리</div>
        <div class="confirm-msg" id="bulkConfirmMsg"></div>
        <div class="confirm-msg-warn">선택한 세대를 납부완료 처리합니다. (변경불가)</div>
        <div class="confirm-btns">
            <button class="btn btn-ghost" onclick="closeBulkConfirm()">취소</button>
            <button class="btn btn-point" onclick="processBulkPayment()">확인</button>
        </div>
    </div>
</div>

<script th:inline="javascript">
    /*<![CDATA[*/
    const CONTEXT_PATH = /*[[${contextPath}]]*/ '/hometop';
    const CSRF_TOKEN   = document.querySelector('meta[name="_csrf"]')?.content;
    const CSRF_HEADER  = document.querySelector('meta[name="_csrf_header"]')?.content;
    /*]]>*/
</script>
<script th:src="@{/js/billing/billing_unpaid.js}"></script>

</body>
</html>
