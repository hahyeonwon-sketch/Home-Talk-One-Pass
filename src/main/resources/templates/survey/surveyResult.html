<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>설문 결과</title>
</head>
<body>

<!-- 상단 -->
<div class="result-top">
    <h2>투표 결과</h2>
    <div class="result-top-btn">
        <button type="button" class="btn-download">다운로드</button>
        <button type="button" class="btn-delete">삭제</button>
    </div>
</div>

<div class="survey-meta">
    <span class="survey-title">설문 제목</span>
    <div class="survey-stats">
        <span class="participate-count">참여 세대: 354/360</span>
        <span class="view-count">조회수: 512</span>
    </div>
</div>

<hr>

<div class="question-result">
    <h4>1. 첫 번째 문항</h4>
    <div class="chart-area">
        차트
    </div>
</div>

<hr>

<div class="question-result">
    <h4>2. 두 번째 문항</h4>
    <div class="chart-area">
        차트
    </div>
</div>

</body>
</html>
