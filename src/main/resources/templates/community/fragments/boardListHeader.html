<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<body>
<!--
    Fragment Style 1 : main banner - BoardList
      - postList, postDetail, postForm에서 사용
-->
  <div th:fragment="boardListHeader(boards, boardId)" class="boardList-header">
    <h1>커뮤니티</h1>
    <nav>
      <a th:each="board : ${boards}" th:text="${board.name}"
         th:href="@{/community/{code}(code=${board.code})}"
         th:classappend="${boardId == board.id ? 'active' : ''}">게시판 이름</a>
    </nav>
  </div>
</body>
</html>
