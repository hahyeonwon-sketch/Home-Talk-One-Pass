<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HomeTOP Community</title>
    <link rel="stylesheet" href="/css/style.css" th:href="@{/css/style.css}">
</head>
<body>
<!--
    (boards=${boards}, boardId=${boardId})
    (categories=${categories}, categoryId=${categoryId})
    이 파라미터들도 Board, Category 한 뒤에 다시 붙이기
 -->
<div th:replace="~{community/fragments/boardListHeader :: boardListHeader(boards=${boards}, boardId=${boardId})}"></div>
<div th:replace="~{community/fragments/categoryBanner :: categoryBanner(board=${board}, categories=${categories}, categoryId=${categoryId})}"></div>

    <div class="form-container">

        <form>
            <select>
                <option>---카테고리 선택---</option>
                <option>---자유---</option>
                <option>---토론---</option>
            </select>
        </form>
    </div>

</body>
</html>
