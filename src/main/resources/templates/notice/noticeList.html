<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>공지 목록</title>


    <link rel="stylesheet" th:href="@{/css/dashboard/style.css}">
</head>
<body>
<div class="main-layout" style="display: flex; min-height: 100vh;">

    <!-- 1. 왼쪽 사이드바 -->
    <div th:replace="~{fragments/sidebar :: sidebar(currentPage='parking')}"></div>

    <!-- 2. 오른쪽 영역 (헤더 + 본문) -->
    <div class="main-wrapper" style="flex: 1; display: flex; flex-direction: column;">

        <!-- 상단 헤더 -->
        <div th:replace="~{fragments/headerCurrentMenuView :: path(paths=${ {'notice'} })}"></div>
        <!--    <div th:replace="~{fragments/headerCurrentMenuView :: path(currentPath01='parking', currentPath02='status')}"></div>-->

        <!-- 상단 메뉴 -->
        <div th:replace="~{fragments/headerCategoryMenu :: notice}"></div>

        <!-- 메인 콘텐츠 -->
        <main class="content" style="flex: 1;">

            <div th:replace="fragments/noticeHeader :: notice-page-header"></div>
            <table class="notice-list">
                <thead class="notice-header">
                <tr>
                    <th>분류</th>
                    <th>제목</th>
                    <th>게시일시</th>
                    <th>수정일시</th>
                    <th>조회수</th>
                </tr>
                </thead>
                <tbody class="notice-lists">
                <tr>
                    <td class="badge-important"><span>중요</span></td>
                    <td><a href="#">중요 공지 제목</a></td>
                    <td>2026-03-21</td>
                    <td>2026-03-23</td>
                    <td>3,021</td>
                </tr>
                <tr>
                    <td class="badge-facility"><span>시설</span></td>
                    <td><a href="#">시설 공지 제목</a></td>
                    <td></td>
                    <td></td>
                    <td></td>
                </tr>
                <tr>
                    <td class="badge-safety"><span>안전</span></td>
                    <td><a href="#">안전 공지 제목</a></td>
                    <td></td>
                    <td></td>
                    <td></td>
                </tr>
                <tr>
                    <td class="badge-normal"><span>일반</span></td>
                    <td><a href="#">일반 공지 제목</a></td>
                    <td></td>
                    <td></td>
                    <td></td>
                </tr>
                <tr>
                    <td class="badge-normal"><span>일반</span></td>
                    <td><a href="#">일반 공지 제목</a></td>
                    <td></td>
                    <td></td>
                    <td></td>
                </tr>
                <tr>
                    <td class="badge-normal"><span>일반</span></td>
                    <td><a href="#">일반 공지 제목</a></td>
                    <td></td>
                    <td></td>
                    <td></td>
                </tr>
                </tbody>
            </table>
            <div class="bottom-wrap">
                <div class="pagination">
                    <a href="#">&lt;</a>
                    <a href="#">1</a>
                    <a href="#">2</a>
                    <a href="#">3</a>
                    <a href="#">4</a>
                    <a href="#">5</a>
                    <a href="#">6</a>
                    <a href="#">&gt;</a>
                </div>
                <div class="notice-search">
                    <span class="search-label">제목</span>
                    <input type="text" name="keyword">
                    <button type="button" class="btn-search">🔍</button>
                </div>
            </div>
        </main>

        <!-- 하단 푸터 삽입 -->
        <footer th:replace="~{fragments/footer :: footer}"></footer>

    </div>
</div>


</body>
</html>
