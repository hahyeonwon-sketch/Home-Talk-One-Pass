<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>공지 상세 | Home talk</title>
  <link rel="stylesheet" th:href="@{/css/dashboard/style.css}">
  <link rel="stylesheet" th:href="@{/css/notice/notice-common.css}">
  <link rel="stylesheet" th:href="@{/css/notice/noticeDetail.css}">
</head>

<body>

<div class="main-layout" style="display:flex; min-height:100vh;">

  <div th:replace="~{fragments/sidebar :: sidebar(currentPage='notice')}"></div>

  <div class="main-wrapper" style="flex:1; display:flex; flex-direction:column;">

    <div th:replace="~{fragments/header_menu :: header_menu(currentPath01='notice', currentPath02='')}"></div>


    <div class="container">

      <table class="notice-table">
        <tr>
          <td th:class="'badge-' + ${notice.badge != null ? notice.badge.name().toLowerCase() : 'normal'}">
            <span th:text="${notice.badge != null ? notice.badge.label : '일반'}"></span>
          </td>
          <td th:text="${notice.title}">공지 제목</td>
          <td th:text="${#temporals.format(notice.createdAt, 'yyyy-MM-dd HH:mm')}">작성일시</td>
          <td th:text="${notice.updatedAt != null ? #temporals.format(notice.updatedAt, 'yyyy-MM-dd HH:mm') : '-'}">수정일시</td>
          <td th:text="${notice.viewCount}">조회수</td>
        </tr>
      </table>

      <div class="notice-box">
        <p th:text="${notice.content}" style="white-space: pre-line;"></p>
      </div>

      <div class="attachment-box" th:if="${attachments != null && !attachments.isEmpty()}">
        <div class="attachment-title">📎 첨부파일</div>
        <div th:each="attachment : ${attachments}">
          <a th:href="@{/notice/download/{id}(id=${attachment.id})}"
             th:text="${attachment.fileName}"
             class="attachment-link"></a>
          <br>
          <img th:if="${attachment.fileName.contains('.jpg') or attachment.fileName.contains('.jpeg') or attachment.fileName.contains('.png')}"
               th:src="@{/uploads/{fileName}(fileName=${attachment.fileName})}"
               style="max-width: 100%; margin-top: 8px; border-radius: 8px;">
        </div>
      </div>

      <table class="notice-nav-table">
        <tr>
          <td>이전글</td>
          <th:block th:if="${preNotice != null}">
            <td><a th:href="@{/notice/{id}(id=${preNotice.id})}" th:text="${preNotice.title}"></a></td>
            <td th:text="${#temporals.format(preNotice.createdAt, 'yyyy-MM-dd')}"></td>
            <td th:text="${preNotice.updatedAt != null ? #temporals.format(preNotice.updatedAt, 'yyyy-MM-dd') : '-'}"></td>
            <td th:text="${preNotice.viewCount}"></td>
          </th:block>
          <th:block th:if="${preNotice == null}">
            <td colspan="4"></td>
          </th:block>
        </tr>
        <tr>
          <td>다음글</td>
          <th:block th:if="${nextNotice != null}">
            <td><a th:href="@{/notice/{id}(id=${nextNotice.id})}" th:text="${nextNotice.title}"></a></td>
            <td th:text="${#temporals.format(nextNotice.createdAt, 'yyyy-MM-dd')}"></td>
            <td th:text="${nextNotice.updatedAt != null ? #temporals.format(nextNotice.updatedAt, 'yyyy-MM-dd') : '-'}"></td>
            <td th:text="${nextNotice.viewCount}"></td>
          </th:block>
          <th:block th:if="${nextNotice == null}">
            <td colspan="4"></td>
          </th:block>
        </tr>
      </table>

      <div class="admin-buttons">
        <a th:href="@{/notice}" class="btn-back">← 뒤로가기</a>
        <div sec:authorize="hasRole('ADMIN')" style="display:flex; gap:8px;">
          <a th:href="@{/notice/{id}/edit(id=${notice.id})}" class="btn-edit">수정</a>
          <form th:action="@{/notice/{id}/delete(id=${notice.id})}" method="post" style="display:inline;">
            <button type="button" class="btn-delete"
                    onclick="if(confirm('삭제하시겠습니까?')) this.form.submit()">삭제</button>
          </form>
        </div>
      </div>

    </div>
  </div>
</div>

</body>
</html>
