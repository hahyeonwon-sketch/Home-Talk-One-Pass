<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>공지 상세 | Home talk</title>
    <link rel="stylesheet" th:href="@{/css/dashboard/style.css}">
    <link rel="stylesheet" th:href="@{/css/notice/notice-common.css}">
    <link rel="stylesheet" th:href="@{/css/notice/noticeDetail.css}">
</head>

<body>

<div class="main-layout" style="display:flex; min-height:100vh;">

    <!-- 1. 왼쪽 사이드바 -->
    <div th:replace="~{fragments/sidebar :: sidebar(currentPage='notice')}"></div>

    <!-- 2. 오른쪽 영역 (헤더 + 본문) -->
    <div class="main-wrapper" style="flex:1; display:flex; flex-direction:column;">

        <!-- 상단 헤더 -->
        <div th:replace="~{fragments/header_menu :: header_menu(currentPath01='notice', currentPath02='')}"></div>

        <!-- 상단 메뉴 -->
        <div th:replace="~{fragments/header-menu/parkingCategoryMenu :: categoryMenu}"></div>

        <!-- 본문 -->
        <div class="container">

            <table class="notice-table">
                <tr>
                    <td th:class="'badge-' + ${notice.badge != null ? notice.badge.name().toLowerCase() : 'normal'}">
                        <span th:text="${notice.badge != null ? notice.badge.label : '일반'}"></span>
                    </td>
                    <td th:text="${notice.title}">공지 제목</td>
                    <td th:text="${#temporals.format(notice.createdAt, 'yyyy-MM-dd HH:mm')}">작성일시</td>
                    <td th:text="${notice.updatedAt != null
                               && !notice.updatedAt.toLocalDate().isEqual(notice.createdAt.toLocalDate())
                               ? #temporals.format(notice.updatedAt, 'yyyy-MM-dd HH:mm') : '-'}">수정일시</td>
                    <td th:text="${notice.viewCount}">조회수</td>
                </tr>
            </table>

            <div class="admin-buttons">
                <a th:href="@{/notice}" class="btn-list">← 뒤로가기</a>
                <a th:href="@{/notice/{id}/edit(id=${notice.id})}" class="btn-edit" sec:authorize="hasRole('ADMIN')">수정</a>
                <form th:action="@{/notice/{id}/delete(id=${notice.id})}" method="post" style="display:inline;" sec:authorize="hasRole('ADMIN')">
                    <button type="button" class="btn-delete"
                            onclick="if(confirm('삭제하시겠습니까?')) this.form.submit()">삭제</button>
                </form>
            </div>

            <!-- 본문 내용 -->
            <div class="notice-box">
                <p th:text="${notice.content}" style="white-space: pre-line;"></p>
            </div>

            <!-- ✅ 첨부파일 영역 -->
            <div th:if="${attachments != null and !attachments.isEmpty()}"
                 style="margin: 12px 0; padding: 12px; border: 1px solid var(--border-color); border-radius: 8px;">
                <p style="font-size: 13px; font-weight: 600; margin-bottom: 8px; color: var(--main-navy);">📎 첨부파일</p>
                <ul style="list-style: none; display: flex; flex-direction: column; gap: 4px;">
                    <li th:each="file : ${attachments}">
                        <a th:href="@{/notice/download/{id}(id=${file.id})}"
                           th:text="${file.fileName}"
                           style="font-size: 13px; color: #333; text-decoration: none;">
                        </a>
                    </li>
                </ul>
            </div>

            <!-- 이전글/다음글 -->
            <table class="notice-nav-table">
                <tr>
                    <td>이전글</td>
                    <th:block th:if="${preNotice != null}">
                        <td>
                            <a th:href="@{/notice/{id}(id=${preNotice.id})}"
                               th:text="${preNotice.title}"></a>
                        </td>
                        <td th:text="${#temporals.format(preNotice.createdAt, 'yyyy-MM-dd')}"></td>
                        <td th:text="${preNotice.updatedAt != null
                                   && !preNotice.updatedAt.toLocalDate().isEqual(preNotice.createdAt.toLocalDate())
                                   ? #temporals.format(preNotice.updatedAt, 'yyyy-MM-dd') : '-'}"></td>
                        <td th:text="${preNotice.viewCount}"></td>
                    </th:block>
                    <th:block th:if="${preNotice == null}">
                        <td colspan="4"></td>
                    </th:block>
                </tr>
                <tr>
                    <td>다음글</td>
                    <th:block th:if="${nextNotice != null}">
                        <td>
                            <a th:href="@{/notice/{id}(id=${nextNotice.id})}"
                               th:text="${nextNotice.title}"></a>
                        </td>
                        <td th:text="${#temporals.format(nextNotice.createdAt, 'yyyy-MM-dd')}"></td>
                        <td th:text="${nextNotice.updatedAt != null
                                   && !nextNotice.updatedAt.toLocalDate().isEqual(nextNotice.createdAt.toLocalDate())
                                   ? #temporals.format(nextNotice.updatedAt, 'yyyy-MM-dd') : '-'}"></td>
                        <td th:text="${nextNotice.viewCount}"></td>
                    </th:block>
                    <th:block th:if="${nextNotice == null}">
                        <td colspan="4"></td>
                    </th:block>
                </tr>
            </table>

        </div>
    </div>
</div>

</body>
</html>
