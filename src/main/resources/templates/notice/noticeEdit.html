<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>공지 수정 | Home talk</title>
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <link rel="stylesheet" th:href="@{/css/dashboard/style.css}">
    <link rel="stylesheet" th:href="@{/css/notice/notice-common.css}">
    <link rel="stylesheet" th:href="@{/css/notice/noticeForm.css}">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
</head>

<body>

<div class="main-layout" style="display:flex; min-height:100vh;">

    <div th:replace="~{fragments/sidebar :: sidebar(currentPage='notice')}"></div>

    <div class="main-wrapper" style="flex:1; display:flex; flex-direction:column;">

        <div th:replace="~{fragments/headerCurrentMenuView :: path(paths=#{'notice'})}"></div>

        <div class="container">
            <h2>공지 수정</h2>

            <form th:action="@{/notice/{id}/edit(id=${notice.id})}" method="post" enctype="multipart/form-data" id="editForm">

                <div class="form-group">
                    <label for="badge">분류</label>
                    <select id="badge" name="badge" required>
                        <option value="">분류 선택</option>
                        <option value="FACILITY"  th:selected="${notice.badge.name() == 'FACILITY'}">시설</option>
                        <option value="SAFETY"    th:selected="${notice.badge.name() == 'SAFETY'}">안전</option>
                        <option value="NORMAL"    th:selected="${notice.badge.name() == 'NORMAL'}">일반</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="title">제목</label>
                    <input type="text" id="title" name="title"
                           th:value="${notice.title}"
                           placeholder="제목을 입력하세요 (최대 100자)" maxlength="100" required>
                    <small><span id="charCount" th:text="${notice.title.length()}">0</span>/100</small>
                </div>

                <div class="form-group notice-content-wrap">
                    <label>내용</label>
                    <input type="hidden" name="content" id="content">
                    <div id="editor" style="height: 300px;"></div>

                    <div class="schedule-modal" id="scheduleModal">
                        <div class="modal-header">
                            <span th:text="${linkedSchedule != null} ? '일정 수정' : '일정 등록'">일정 등록</span>
                            <button type="button" onclick="document.getElementById('scheduleModal').classList.remove('open')">X</button>
                        </div>
                        <div class="modal-body">
                            <table class="modal-table">
                                <tr>
                                    <td>일정명</td>
                                    <td><input type="text" id="scheduleName" placeholder="일정명을 입력하세요."></td>
                                </tr>
                                <tr>
                                    <td>시작</td>
                                    <td>
                                        <div class="modal-time-row">
                                            <input type="date" id="scheduleStartDate">
                                            <select id="scheduleStartHour">
                                                <option th:each="h : ${#numbers.sequence(0, 23)}"
                                                        th:value="${#strings.toString(h).length() == 1 ? '0' + h : h}"
                                                        th:text="${#strings.toString(h).length() == 1 ? '0' + h : h}"></option>
                                            </select>
                                            <span class="modal-time-sep">:</span>
                                            <select id="scheduleStartMinute">
                                                <option th:each="m : ${#numbers.sequence(0, 59)}"
                                                        th:value="${#strings.toString(m).length() == 1 ? '0' + m : m}"
                                                        th:text="${#strings.toString(m).length() == 1 ? '0' + m : m}"></option>
                                            </select>
                                        </div>
                                    </td>
                                </tr>
                                <tr>
                                    <td>종료</td>
                                    <td>
                                        <div class="modal-time-row">
                                            <input type="date" id="scheduleEndDate">
                                            <select id="scheduleEndHour">
                                                <option th:each="h : ${#numbers.sequence(0, 23)}"
                                                        th:value="${#strings.toString(h).length() == 1 ? '0' + h : h}"
                                                        th:text="${#strings.toString(h).length() == 1 ? '0' + h : h}"></option>
                                            </select>
                                            <span class="modal-time-sep">:</span>
                                            <select id="scheduleEndMinute">
                                                <option th:each="m : ${#numbers.sequence(0, 59)}"
                                                        th:value="${#strings.toString(m).length() == 1 ? '0' + m : m}"
                                                        th:text="${#strings.toString(m).length() == 1 ? '0' + m : m}"></option>
                                            </select>
                                        </div>
                                    </td>
                                </tr>
                                <tr>
                                    <td>설명</td>
                                    <td><textarea id="scheduleInfo"></textarea></td>
                                </tr>
                                <tr>
                                    <td>장소</td>
                                    <td><input type="text" id="scheduleLocation" placeholder="장소를 입력하세요."></td>
                                </tr>
                            </table>
                            <div class="modal-bottom">
                                <button type="button" class="btn-register" onclick="registerSchedule()">확인</button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 일정 hidden inputs -->
                <input type="hidden" id="scheduleStartAt" name="scheduleStartAt">
                <input type="hidden" id="scheduleEndAt" name="scheduleEndAt">
                <input type="hidden" id="scheduleNameHidden" name="scheduleName">
                <input type="hidden" id="scheduleInfoHidden" name="scheduleInfo">
                <input type="hidden" id="scheduleLocationHidden" name="scheduleLocation">

                <div class="button-group">
                    <div class="button-group-left">
                        <input type="file" id="file" name="file">
                        <label for="file" class="btn btn-file">파일 올리기</label>
                        <span id="fileName" class="file-name"></span>
                    </div>
                    <div class="button-group-right">
                        <div class="checkbox-group">
                            <input type="hidden" name="_isPinned" value="on">
                            <input type="checkbox" id="isPinned" name="isPinned" value="true"
                                   th:checked="${notice.isPinned}">
                            <label for="isPinned">상단 고정</label>
                        </div>
                        <button type="button" class="btn-schedule"
                                onclick="document.getElementById('scheduleModal').classList.add('open')"
                                th:text="${linkedSchedule != null} ? '일정 수정' : '일정 등록'"></button>
                        <a th:href="@{/notice/{id}(id=${notice.id})}" class="btn btn-cancel"
                           onclick="return confirmCancel()">취소</a>
                        <button type="submit" class="btn-submit">수정 완료</button>
                    </div>
                </div>

            </form>
        </div>
        <footer th:replace="~{fragments/footer :: footer}"></footer>
    </div>
</div>

<script th:inline="javascript">
    var savedContent = /*[[${notice.content}]]*/ '';
    var imageUploadUrl = /*[[@{/notice/image-upload}]]*/ '/notice/image-upload';
    var linkedSchedule = /*[[${linkedSchedule}]]*/ null;
</script>

<script>
    function formatDate(year, month, day) {
        return year + '-' + pad(month) + '-' + pad(day);
    }

    function pad(n) { return n < 10 ? '0' + n : '' + n; }

    function extractDate(dt) {
        if (!dt) return '';
        if (typeof dt === 'object' && dt.year) {
            return formatDate(dt.year, dt.monthValue, dt.dayOfMonth);
        }
        return dt.substring(0, 10);
    }

    function extractHour(dt) {
        if (!dt) return '00';
        if (typeof dt === 'object' && dt.hour !== undefined) return pad(dt.hour);
        return dt.substring(11, 13);
    }

    function extractMinute(dt) {
        if (!dt) return '00';
        if (typeof dt === 'object' && dt.minute !== undefined) return pad(dt.minute);
        return dt.substring(14, 16);
    }

    var quill = new Quill('#editor', {
        theme: 'snow',
        modules: {
            toolbar: {
                container: [
                    ['bold', 'italic', 'underline'],
                    [{ 'align': [] }],
                    [{ 'size': ['small', false, 'large', 'huge'] }],
                    [{ 'color': [] }],
                    ['link', 'image']
                ],
                handlers: {
                    image: function() {
                        var input = document.createElement('input');
                        input.setAttribute('type', 'file');
                        input.setAttribute('accept', 'image/*');
                        input.click();
                        input.onchange = function() {
                            var file = input.files[0];
                            var formData = new FormData();
                            formData.append('file', file);

                            var csrfToken = document.querySelector('meta[name="_csrf"]').content;
                            var csrfHeader = document.querySelector('meta[name="_csrf_header"]').content;
                            var headers = {};
                            headers[csrfHeader] = csrfToken;

                            fetch(imageUploadUrl, {
                                method: 'POST',
                                headers: headers,
                                body: formData
                            })
                            .then(res => res.json())
                            .then(data => {
                                var range = quill.getSelection();
                                quill.insertEmbed(range.index, 'image', data.url);
                            });
                        };
                    }
                }
            }
        }
    });

    setTimeout(function() {
        if (savedContent) quill.root.innerHTML = savedContent;
    }, 100);

    if (linkedSchedule) {
        document.getElementById('scheduleName').value = linkedSchedule.title || '';
        document.getElementById('scheduleInfo').value = linkedSchedule.info || '';
        document.getElementById('scheduleLocation').value = linkedSchedule.location || '';

        if (linkedSchedule.startAt) {
            document.getElementById('scheduleStartDate').value = extractDate(linkedSchedule.startAt);
            document.getElementById('scheduleStartHour').value = extractHour(linkedSchedule.startAt);
            document.getElementById('scheduleStartMinute').value = extractMinute(linkedSchedule.startAt);
        }
        if (linkedSchedule.endAt) {
            document.getElementById('scheduleEndDate').value = extractDate(linkedSchedule.endAt);
            document.getElementById('scheduleEndHour').value = extractHour(linkedSchedule.endAt);
            document.getElementById('scheduleEndMinute').value = extractMinute(linkedSchedule.endAt);
        }
    } else {
        document.getElementById('scheduleStartMinute').value = '00';
        document.getElementById('scheduleEndMinute').value = '00';
    }

    document.getElementById('title').addEventListener('input', function() {
        document.getElementById('charCount').innerText = this.value.length;
    });

    document.getElementById('file').addEventListener('change', function() {
        document.getElementById('fileName').innerText = this.files[0]?.name || '';
    });

    function registerSchedule() {
        var startDate    = document.getElementById('scheduleStartDate').value;
        var endDate      = document.getElementById('scheduleEndDate').value;
        var startHour    = document.getElementById('scheduleStartHour').value;
        var startMinute  = document.getElementById('scheduleStartMinute').value || '00';
        var endHour      = document.getElementById('scheduleEndHour').value;
        var endMinute    = document.getElementById('scheduleEndMinute').value || '00';
        var scheduleName = document.getElementById('scheduleName').value.trim();

        if (!scheduleName) {
            alert('일정명을 입력해주세요.');
            return;
        }
        if (!startDate) {
            alert('시작 날짜를 입력해주세요.');
            return;
        }

        if (endDate) {
            var startAt = new Date(startDate + 'T' + startHour + ':' + startMinute + ':00');
            var endAt   = new Date(endDate   + 'T' + endHour   + ':' + endMinute   + ':00');
            if (endAt <= startAt) {
                alert('종료 시간이 시작 시간보다 이후여야 합니다.');
                return;
            }
        }

        document.getElementById('scheduleModal').classList.remove('open');
    }

    document.getElementById('editForm').addEventListener('submit', function() {
        document.getElementById('content').value = quill.root.innerHTML;

        var scheduleName = document.getElementById('scheduleName').value.trim();
        var startDate    = document.getElementById('scheduleStartDate').value;
        var startHour    = document.getElementById('scheduleStartHour').value;
        var startMinute  = document.getElementById('scheduleStartMinute').value || '00';
        var endDate      = document.getElementById('scheduleEndDate').value;
        var endHour      = document.getElementById('scheduleEndHour').value;
        var endMinute    = document.getElementById('scheduleEndMinute').value || '00';

        document.getElementById('scheduleNameHidden').value = scheduleName;
        document.getElementById('scheduleInfoHidden').value = document.getElementById('scheduleInfo').value;
        document.getElementById('scheduleLocationHidden').value = document.getElementById('scheduleLocation').value;

        if (startDate) {
            document.getElementById('scheduleStartAt').value = startDate + 'T' + startHour + ':' + startMinute + ':00';
        }
        if (endDate) {
            document.getElementById('scheduleEndAt').value = endDate + 'T' + endHour + ':' + endMinute + ':00';
        }
    });

    function confirmCancel() {
        return confirm("수정 중인 내용을 취소하고 돌아가시겠습니까?");
    }
</script>

</body>
</html>
