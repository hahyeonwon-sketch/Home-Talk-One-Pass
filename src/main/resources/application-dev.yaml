server:
  port: 8090

spring:
  datasource:
    url: jdbc:mysql://210.178.108.186:3306/hometopdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: onepass
    password: hometop402
    driver-class-name: com.mysql.cj.jdbc.Driver
  security:
    oauth2:
      client:
        # 1. 클라이언트 설정: 각 소셜 서비스(카카오, 네이버 등)의 계정 정보 등록
        registration:
          kakao:
            client-id: 4ad79c0bcd4a2a0ab2ac8b3d0fb76b76 # 카카오에서 발급받은 REST API 키
            client-secret: k8NJmdYf0NQAD0JShTsmevgS5Q4qzz2s # 카카오 보안을 위해 발급받은 비밀키
            client-authentication-method: client_secret_post # 인증 시 ID와 Secret을 POST 요청 바디에 담아 보냄
            authorization-grant-type: authorization_code # OAuth2의 표준 인증 방식인 '권한 부여 코드' 방식 사용
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}" # 로그인 리다이렉트 주소
            scope: # 카카오로부터 제공받을 유저 정보 범위
              - profile_nickname
              - account_email
            client-name: Kakao # 로그인 페이지 등에 표시될 서비스 이름

          naver:
            client-id: oBYc1NEcmhM2m_WHKWaH # 네이버에서 발급받은 Client ID
            client-secret: qZVkWuUwnw # 네이버에서 발급받은 Client Secret
            client-authentication-method: client_secret_post # 인증 정보를 POST 방식으로 전달
            authorization-grant-type: authorization_code # 권한 코드 방식 사용
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}" # 로그인 리다이렉트 주소
            scope: # 네이버로부터 제공받을 유저 정보 범위
              - name
              - email
            client-name: Naver

        # 2. 프로바이더 설정: 소셜 서비스별로 서로 다른 API 주소(엔드포인트) 등록
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize # 사용자가 로그인을 진행할 카카오 페이지 주소
            token-uri: https://kauth.kakao.com/oauth/token # 발급받은 코드로 Access Token을 교환할 주소
            user-info-uri: https://kapi.kakao.com/v2/user/me # Access Token으로 사용자 정보를 가져올 주소
            user-name-attribute: id # 카카오 응답 데이터에서 유저를 식별하는 고유 키값

          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize # 네이버 로그인 페이지 주소
            token-uri: https://nid.naver.com/oauth2.0/token # 네이버 토큰 발급 주소
            user-info-uri: https://openapi.naver.com/v1/nid/me # 네이버 유저 정보 조회 주소
            user-name-attribute: response # 네이버는 유저 정보를 'response'라는 JSON 객체 안에 담아주므로 이를 지정


  # SQL 초기화 스크립트 설정
  sql:
    init:
      mode: never       # never: 스크립트 실행 안 함 | always: 매 기동 시 실행
      encoding: UTF-8
  jpa:
    defer-datasource-initialization: true   # datasource 초기화 후 data.sql 실행(순서 보장)
    hibernate:
      ddl-auto: update
    show-sql: false

  thymeleaf:
    cache: false

logging:
  level:
    root: INFO        # 전체 기본 로그 레벨
    com.hometalk: DEBUG     # 프로젝트 패키지 - 상세 로그 출력
    org.hibernate.SQL: DEBUG    # hibernate SQL 쿼리 로그

file:
  upload:
    path: ${user.dir}/uploads
