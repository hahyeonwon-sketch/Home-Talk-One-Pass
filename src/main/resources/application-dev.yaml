server:
  port: 8090

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/onepassdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password: 12345
    driver-class-name: com.mysql.cj.jdbc.Driver

  # SQL 초기화 스크립트 설정
  sql:
    init:
      mode: never
      encoding: UTF-8

  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: update
    show-sql: false


  thymeleaf:
    cache: false

logging:
  level:
    root: INFO
    com.hometalk: DEBUG
    org.hibernate.SQL: DEBUG